upstream backend_go {
    server 127.0.0.1:8091;
}

upstream frontend_vue {
    server 127.0.0.1:8090;
}

# 1. Servidor HTTP - Puerto 80 (Redirección forzada a HTTPS y Desafío Certbot)
server {
    listen 80;
    listen [::]:80;
    server_name apiconsulta.sehuacho.com;

    # Permitir renovación automática de Let's Encrypt (Certbot)
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
        allow all;
    }

    # Redirección global permanente a HTTPS
    location / {
        return 301 https://$host$request_uri;
    }
}

# 2. Servidor HTTPS - Puerto 443 (Proxy Seguro y SSL/TLS)
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name apiconsulta.sehuacho.com;

    # Certificados SSL de Let's Encrypt (Certbot los rellenará/gestionará)
    ssl_certificate /etc/letsencrypt/live/apiconsulta.sehuacho.com-0001/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/apiconsulta.sehuacho.com-0001/privkey.pem;

    # Configuraciones de Seguridad SSL Premium (A+ Rank en SSL Labs)
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;
    ssl_ciphers 'ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:DHE-RSA-AES128-GCM-SHA256:DHE-RSA-AES256-GCM-SHA384';
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;

    # Cabeceras HSTS (HTTP Strict Transport Security)
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header X-Frame-Options DENY always;
    add_header X-Content-Type-Options nosniff always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "no-referrer-when-downgrade" always;

    # Compresión GZIP activa
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;
    gzip_proxied any;
    gzip_min_length 1000;

    # Proxy Inverso para el Panel de Administración Vue (Frontend)
    location / {
        proxy_pass http://frontend_vue;
        proxy_http_version 1.1;
        
        # Cabeceras de Proxy Estándar
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # Soporte para WebSockets (Hot Reloading en dev si aplica)
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        
        proxy_read_timeout 90s;
    }

    # Proxy Inverso para el Microservicio Core (Go Backend)
    location /api {
        proxy_pass http://backend_go;
        proxy_http_version 1.1;

        # Cabeceras de Proxy
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # Deshabilitar almacenamiento en caché local del proxy para la API
        proxy_cache_bypass $http_upgrade;
        proxy_no_cache 1;
        
        proxy_read_timeout 90s;
    }
}
